[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
ffi = true
extra_output = ["storageLayout"]

fs_permissions = [
    { access = "read", path = "out/" },
    { access = "read", path = "test/" },
    { access = "read", path = "../assets/" },
    { access = "read-write", path = "script-output/" },
]

[profile.deploy]

remappings = [
    "forge-std/=lib/forge-std/src/",
    "@openzeppelin/=lib/openzeppelin-contracts/",
]
