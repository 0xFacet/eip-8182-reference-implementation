[profile.default]
src = "contracts/src"
test = "contracts/test"
script = "contracts/script"
out = "build/forge-out"
libs = ["contracts/lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./build" }]
ffi = true

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = false
